services:

  # ─── Storage: PostgreSQL ───────────────────────────────────────────
  storage:
    image: postgres:16-alpine
    container_name: uas_storage
    restart: unless-stopped
    environment:
      POSTGRES_DB: logdb
      POSTGRES_USER: loguser
      POSTGRES_PASSWORD: logpass123
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loguser -d logdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ─── Broker: Redis ────────────────────────────────────────────────
  broker:
    image: redis:7-alpine
    container_name: uas_broker
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - broker_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  # ─── Aggregator: FastAPI ──────────────────────────────────────────
  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    container_name: uas_aggregator
    restart: unless-stopped
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://loguser:logpass123@storage:5432/logdb"
      BROKER_URL: "redis://broker:6379"
      WORKER_COUNT: "4"
      LOG_LEVEL: "INFO"
    ports:
      - "8080:8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Publisher: Event Simulator (run on demand) ───────────────────
  publisher:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    container_name: uas_publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      TARGET_URL: "http://aggregator:8080"
      EVENT_COUNT: "20000"
      DUPLICATE_RATE: "0.30"
      BATCH_SIZE: "50"
      CONCURRENCY: "10"
    profiles:
      - publisher
    networks:
      - internal
    restart: "no"

  # ─── Additional workers for concurrency demo ──────────────────────
  aggregator_worker2:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    container_name: uas_aggregator_worker2
    restart: unless-stopped
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://loguser:logpass123@storage:5432/logdb"
      BROKER_URL: "redis://broker:6379"
      WORKER_COUNT: "4"
      LOG_LEVEL: "INFO"
    networks:
      - internal
    profiles:
      - workers

volumes:
  pg_data:
    name: uas_pg_data
  broker_data:
    name: uas_broker_data

networks:
  internal:
    name: uas_internal
    driver: bridge
